<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Key TNG</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const referrer = document.referrer;
      const allowedReferrers = ["lootdest.org", "loot-link.com"];
      const isAllowed = allowedReferrers.some(domain => referrer.includes(domain));

      if (!isAllowed) {
        // Hiển thị nội dung chính bên trong iframe
        document.body.innerHTML = `<iframe src="indexs.html" allow="fullscreen"></iframe>`;
      } else {
        // Hiển thị thông báo chặn
        document.body.innerHTML = `
          <h1><span style="color:red;font-size:32px">X</span> Anti Bypass</h1>
          <p>Bạn không truy cập từ nguồn hợp lệ.<br>Vui lòng quay lại trang rút gọn và làm nhiệm vụ.</p>
        `;
      }
    });
  </script>
</body>
</html>
