<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kiểm tra truy cập</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    #message {
      font-size: 20px;
      color: red;
    }
  </style>
</head>
<body>
  <h1 id="message">Đang kiểm tra truy cập...</h1>
  <div id="content"></div>

  <script>
    const ref = document.referrer;
    const allowedDomains = [
      "linkvertise.com",
      "publisher.linkvertise.com"
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const isRaw = urlParams.has('raw'); // Kiểm tra xem URL có chứa ?raw hay không

    let isAllowed = false;
    let isValidAccess = false; // Mặc định là false

    // Kiểm tra nếu referrer là một trong các domain cho phép
    for (let domain of allowedDomains) {
      if (ref.includes(domain)) {
        isAllowed = true;
        break;
      }
    }
    text = "false"
    if (isAllowed) {
      isValidAccess = true;
      text = "true"
    }

    if (isRaw) {
      // Nếu có ?raw, hiển thị "true"
      document.body.innerHTML = text;
    } else {
      if (isValidAccess) {
        document.getElementById("message").innerText = "✅ Truy cập hợp lệ từ Linkvertise!";
      } else if (ref === "") {
        document.getElementById("message").innerText = "⚠️ Vui lòng không dán link trực tiếp. Truy cập qua Linkvertise!";
      } else {
        document.getElementById("message").innerText = "⛔ Truy cập bị từ chối! Hãy vào từ linkvertise.com.";
      }
    }
  </script>
</body>
</html>
