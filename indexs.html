<!DOCTYPE html>
<html>
<head>
    <title>Verify Key</title>
</head>
<body style="font-family:sans-serif; text-align:center; margin-top:50px;">
    <h1>🎉 Xác minh hoàn tất</h1>
    <p>Bấm nút dưới đây để gửi tín hiệu về ứng dụng C#</p>
    <button onclick="notifyApp()">Gửi tín hiệu</button>

    <script>
        function notifyApp() {
            fetch("http://localhost:5000/done/")
                .then(response => {
                    window.close(); 
                })
                .catch(error => {
                    window.close(); 
                });
        }
    </script>
</body>
</html>
