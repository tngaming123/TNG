<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Key TNG</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
    }
    .red-x {
      color: red !important;
      font-size: 30px;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const referrer = document.referrer;
      console.log("Referrer:", referrer);
      const allowedReferrers = ["https://linkvertise.com/"];
      const isAllowed = allowedReferrers.some(domain => referrer.includes(domain));

      if (!isAllowed) {
        // Nếu referrer không hợp lệ, hiển thị thông báo Anti Bypass
        const htmlContent = `
          <h1><i class="red-x">X</i> Anti Bypass</h1>
          <p>You have used the bypass link, please come back and do the task.</p>
        `;
        document.body.innerHTML = htmlContent;
      } else {
        // Kiểm tra và thêm key vào URL nếu chưa có
        const url = new URL(window.location.href);
        let key = url.searchParams.get("key");
        if (!key) {
          key = "tng-" + crypto.randomUUID();  // Tạo key ngẫu nhiên
          url.searchParams.set("key", key);
          window.history.replaceState({}, "", url);  // Cập nhật URL với key
        }

        // Mã HTML Base64
        const htmlBase64 = "PCFET0NUWVBFIGh0bWw+CjxodG1sPgo8aGVhZD4KICA8bWV0YSBjaGFyc2V0PVwiVVRGLThcIj4KICA8dGl0bGU+SGVsbG88L3RpdGxlPgo8L2hlYWQ+CjwvYm9keT4KPC9odG1sPg==";
        
        // Giải mã Base64
        const decodedHTML = atob(htmlBase64);
        const blob = new Blob([decodedHTML], { type: "text/html" });
        const blobURL = URL.createObjectURL(blob);

        // Tạo iframe để chèn nội dung HTML đã giải mã
        const iframe = document.createElement("iframe");
        iframe.src = blobURL;
        document.body.appendChild(iframe);
      }
    });
  </script>
</head>
<body>
  <p>Đang kiểm tra...</p>
</body>
</html>
