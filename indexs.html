<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kiểm tra truy cập từ Linkvertise</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    #message {
      font-size: 20px;
      color: red;
    }
  </style>
</head>
<body>
  <h1 id="message">Đang kiểm tra truy cập...</h1>

  <script>
    const ref = document.referrer;
    const allowed = "linkvertise.com";

    if (ref.includes(allowed)) {
      document.getElementById("message").innerText = "✅ Truy cập hợp lệ từ Linkvertise!";
    } else if (ref === "") {
      document.getElementById("message").innerText = "⚠️ Vui lòng không dán link trực tiếp. Truy cập qua Linkvertise!";
    } else {
      document.getElementById("message").innerText = "⛔ Truy cập bị từ chối! Hãy vào từ linkvertise.com.";
    }
  </script>
</body>
</html>
