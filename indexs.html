<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kiểm tra truy cập</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    #message {
      font-size: 20px;
      color: red;
    }
  </style>
</head>
<body>
  <h1 id="message">Đang kiểm tra truy cập...</h1>
  <div id="content"></div>

  <script>
    const ref = document.referrer;
    const allowedDomains = [
      "linkvertise.com",
      "publisher.linkvertise.com"
    ];

    const urlParams = new URLSearchParams(window.location.search);

    let isAllowed = false;
    let isValidAccess = false; // Mặc định là false

    // Kiểm tra nếu referrer là một trong các domain cho phép
    for (let domain of allowedDomains) {
      if (ref.includes(domain)) {
        isAllowed = true;
        break;
      }
    }
    text = "false"
    if (isAllowed) {
      isValidAccess = true;
      text = "Succes!"
    }

    if (isValidAccess) {
        document.body.innerHTML = text;
      } else if (ref === "") {
        document.body.innerHTML = "faslefasle";
      } else {
        document.body.innerHTML = "fasle";
      }
  </script>
</body>
</html>
