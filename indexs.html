<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kiểm tra truy cập</title>
</head>
<body>
  <script>
    const ref = document.referrer;
    const allowedDomains = [
      "linkvertise.com",
      "publisher.linkvertise.com"
    ];

    let isAllowed = false;

    for (let domain of allowedDomains) {
      if (ref.includes(domain)) {
        isAllowed = true;
        break;
      }
    }

    // Mã hóa base64 cho nội dung
    const encodedTng = "dG5n";        // "tng"
    const encodedFalse = "ZmFsc2U=";  // "false"

    const decodedHTML = atob(isAllowed ? encodedTng : encodedFalse);

    document.open();
    document.write(decodedHTML);
    document.close();
  </script>
</body>
</html>
