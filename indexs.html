<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kiểm tra truy cập</title>
</head>
<body>
  <script>
    const ref = document.referrer;
    const allowedDomains = [
      "linkvertise.com",
      "publisher.linkvertise.com"
    ];

    let isAllowed = false;

    // Kiểm tra nếu referrer là một trong các domain cho phép
    for (let domain of allowedDomains) {
      if (ref.includes(domain)) {
        isAllowed = true;
        break;
      }
    }

    // Trả về true hoặc false dưới dạng văn bản thuần túy
    if (isAllowed) {
      document.write("true");
    } else {
      document.write("false");
    }
  </script>
</body>
</html>
