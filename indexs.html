<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trang chính</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const referrer = document.referrer;
      const allowedReferrers = ["lootdest.org"];
      const isAllowed = allowedReferrers.some(domain => referrer.includes(domain));

      if (!isAllowed) {
        // Chặn truy cập nếu không phải từ linkvertise/lootlab
        document.body.innerHTML = `
          <h1>❌ Truy cập không hợp lệ</h1>
          <p>Bạn phải truy cập thông qua Linkvertise hoặc LootLab để vào trang này.</p>
        `;
      } else {
        // Cho phép truy cập
        const decodedHTML = atob("PCFET0NUWVBFIGh0bWw+CjxodG1sPgo8Ym9keT4KICA8aDE+SGVsbG88L2gxPgo8L2JvZHk+CjwvaHRtbD4=");
        document.open();
        document.write(decodedHTML);
        document.close();
      }
    });
  </script>
</head>
<body>
  <p>Đang kiểm tra nguồn truy cập...</p>
</body>
</html>
